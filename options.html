<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jira Component Autofill</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Jira Component Autofill</h1>
        <p>Set local Chrome rules that auto-fill the Jira <strong>Components</strong> field when you create an issue.</p>
      </section>

      <section class="panel">
        <label class="toggle">
          <input id="extension-enabled" type="checkbox">
          <span>Extension enabled</span>
        </label>
        <p class="hint">Rules are stored only in your Chrome profile via <code>chrome.storage.sync</code>.</p>
      </section>

      <section class="panel">
        <h2 id="form-title">Add rule</h2>
        <form id="rule-form" class="rule-form">
          <input id="rule-id" type="hidden">

          <label class="field">
            <span>Space or project fragment</span>
            <input id="project-matcher" type="text" placeholder="Example: ENG or Engineering" required>
          </label>

          <label class="field">
            <span>Components</span>
            <input id="components" type="text" placeholder="Example: Backend, API, UI" required>
          </label>

          <label class="toggle">
            <input id="rule-enabled" type="checkbox" checked>
            <span>Rule enabled</span>
          </label>

          <div class="actions">
            <button class="primary" type="submit">Save rule</button>
            <button id="cancel-edit" type="button" hidden>Cancel</button>
          </div>
        </form>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Rules</h2>
        <div id="rules-empty" class="empty">No rules yet.</div>
        <div id="rules-list" class="rules"></div>
      </section>
    </main>

    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
  </html>
